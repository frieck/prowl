name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building PRowl $VERSION"

      - name: Build DMG
        env:
          VERSION: ${{ env.VERSION }}
        run: ./dmg.sh

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent PRowl.app "build/PRowl-${VERSION}.zip"

      - name: Checksums
        run: |
          shasum -a 256 "build/PRowl.dmg" "build/PRowl-${VERSION}.zip" > "build/SHA256SUMS.txt"
          cat "build/SHA256SUMS.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PRowl ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            build/PRowl.dmg
            build/PRowl-${{ env.VERSION }}.zip
            build/SHA256SUMS.txt
