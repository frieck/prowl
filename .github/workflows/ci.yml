name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Assemble app bundle
        run: ./build.sh release

      - name: Verify bundle
        run: codesign --verify --deep --strict PRowl.app
